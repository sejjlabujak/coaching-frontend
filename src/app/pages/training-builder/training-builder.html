<mat-sidenav-container class="app-container">
  <mat-sidenav
    mode="side"
    opened
    [style.width.px]="isSidebarExpanded ? 200 : 70"
  >
    <sidebar (expandedChange)="onExpandedChange($event)"></sidebar>
  </mat-sidenav>

  <mat-sidenav-content
    class="main-content"
    [style.marginLeft.px]="isSidebarExpanded ? 200 : 70"
  >
    <header></header>

    <div class="page-wrapper">
      <div class="builder-content">

        <div class="builder-header">
          <div class="title-group">
            <h2>Training Session Builder</h2>
            <input
              class="session-title-input"
              type="text"
              placeholder="Enter session title..."
              [(ngModel)]="sessionTitle"
            />
          </div>
          <div class="header-right">
            <!-- Inline date picker shown when no date selected -->
            <div class="date-picker-inline" *ngIf="showDatePicker">
              <input
                class="date-input"
                type="date"
                [(ngModel)]="manualDate"
              />
              <button class="confirm-date-btn" (click)="onManualDateConfirm()">Confirm & Save</button>
              <button class="cancel-date-btn" (click)="onManualDateCancel()">Cancel</button>
            </div>
            <span class="selected-date" *ngIf="targetDate && !showDatePicker">
              📅 {{ targetDate | date:'MMMM d, yyyy' }}
            </span>
            <button-2 (click)="saveToCalendar()">Save to Calendar</button-2>
          </div>
        </div>

        <div class="progress-section">
          <progress-tracker [duration]="totalDuration" [goal]="90"></progress-tracker>
        </div>

        <div class="builder-body">
          <div class="drill-sequence-panel">
            <div class="drill-sequence-header">
              <span>Drill Sequence</span>
            </div>
            <div
              cdkDropList
              [cdkDropListData]="drills"
              class="drill-sequence-list"
              (cdkDropListDropped)="drop($event)"
            >
              <drill-card
                *ngFor="let drill of drills"
                cdkDrag
                [drill]="drill"
                [isSidebarMode]="false"
                [isSessionMode]="true"
                [showEditButton]="false"
                (deleteDrill)="onDeleteDrill($event)"
                (durationChanged)="onDurationChanged($event)"
              ></drill-card>
            </div>
          </div>

          <div class="drill-library-panel">
            <drill-library-sidebar
              (drillAdded)="onDrillAdd($event)"
              [isMaxDuration]="isMaxDuration"
            ></drill-library-sidebar>
          </div>
        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
