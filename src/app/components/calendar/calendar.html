<div class="calendar-wrapper">
  <!-- Header -->
  <div class="cal-header">
    <div class="cal-title">
      <span>Training Calendar</span>
    </div>
    <div class="cal-nav">
      <button class="nav-btn" (click)="prevMonth()">&#8249;</button>
      <span class="cal-month-label">{{ currentMonthLabel }}</span>
      <button class="nav-btn" (click)="nextMonth()">&#8250;</button>
    </div>
    <modal #modalRef>
      <button-2 (click)="modalRef.openDialog('0ms', '0ms')">Add Training</button-2>
    </modal>
  </div>

  <div class="cal-grid">
    <div class="day-label" *ngFor="let d of dayLabels">{{ d }}</div>

    <div class="day-cell empty" *ngFor="let e of leadingEmpties"></div>

    <div
      class="day-cell"
      *ngFor="let day of daysInMonth"
      [class.today]="isToday(day)"
      (click)="selectDay(day)"
    >
      <span class="day-number">{{ day }}</span>
      <div class="events">
        <div
          class="event-chip"
          *ngFor="let ev of getEvents(day)"
          [class.chip-red]="ev.color === 'red'"
          [class.chip-navy]="ev.color === 'navy'"
        >
          {{ ev.title }}
        </div>
      </div>
    </div>
  </div>
</div>
