<div *ngIf="!isSidebarMode" class="drill-card-main" [class.dragging]="isDragging">
  <div class="drill-card-header">
    <div class="drill-info">
      <h3 class="drill-title">{{ drill.title }}</h3>
      <div class="drill-meta">
        <span class="drill-level" *ngIf="drill.level">{{ drill.level }}</span>
        <div class="drill-duration-input-inline">
          <input
            [id]="'duration-' + drill.id"
            type="number"
            class="duration-input-inline"
            [value]="drill.duration || ''"
            (change)="onDurationChange($event)"
            placeholder="—"
            min="0"
          />
          <span class="duration-unit">min</span>
        </div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="card-actions">
      <button
        mat-icon-button
        class="expand-btn"
        (click)="onToggleExpand()"
        [title]="isExpanded ? 'Collapse' : 'Expand'"
      >
        <mat-icon>{{ isExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
      </button>
      <!-- Edit button - hidden in session mode -->
      <button
        *ngIf="showEditButton && !isSessionMode"
        mat-icon-button
        class="edit-btn"
        (click)="onEditClick()"
        title="Edit drill"
      >
        <mat-icon>edit</mat-icon>
      </button>
      <!-- Delete/Remove button -->
      <button
        mat-icon-button
        class="delete-btn"
        (click)="onDeleteClick()"
        [title]="isSessionMode ? 'Remove from session' : 'Delete drill'"
      >
        <mat-icon>{{ isSessionMode ? 'remove_circle_outline' : 'delete_outline' }}</mat-icon>
      </button>
    </div>
  </div>

  <div *ngIf="drill.description && isExpanded" class="drill-description">
    {{ drill.description }}
  </div>

  <div *ngIf="drill.equipment && drill.equipment.length && isExpanded" class="drill-equipment">
    <strong>Equipment:</strong>
    <span class="equipment-list">{{ drill.equipment.join(', ') }}</span>
  </div>
</div>

<!-- Sidebar Mode (Condensed) -->
<div *ngIf="isSidebarMode" class="drill-card-sidebar">
  <div class="sidebar-card-content">
    <h4 class="sidebar-drill-title">{{ drill.title }}</h4>
    <span class="sidebar-drill-tag" *ngIf="drill.tag">{{ drill.tag }}</span>
  </div>
  <button
    mat-icon-button
    class="add-btn"
    (click)="onAddClick()"
    title="Add to training"
    [disabled]="isMaxDuration"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
